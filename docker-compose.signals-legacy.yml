services:
  signals-legacy:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-trd}-signals-legacy
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    command: ["/usr/local/bin/run-signals-legacy.sh"]
    environment:
      TZ: ${TZ:-UTC}
      SIGNALS_WEB_DOCROOT: ${SIGNALS_WEB_DOCROOT:-/app/signals-server}
      SIGNALS_BIND_HOST: ${SIGNALS_BIND_HOST:-0.0.0.0}
      SIGNALS_BIND_PORT: ${SIGNALS_BIND_PORT:-8081}
      TRADEBOT_PHP_HOST: ${TRADEBOT_PHP_HOST:-http://web}
      SIGNALS_API_URL: ${SIGNALS_API_URL:-http://signals-legacy:8081}
      BOT_SERVER_HOST: ${BOT_SERVER_HOST:-bots-hive}
    ports:
      - "${SIGNALS_LEGACY_PORT:-8090}:8081"
    volumes:
      - ./signals-server:/app/signals-server
      - ./src:/app/src
      - ./docker/entrypoints/run-signals-legacy.sh:/usr/local/bin/run-signals-legacy.sh:ro
      - ./secrets/signals_db_config.php:/usr/local/etc/php/db_config.php:ro
      - ./var/log:/app/var/log
      - ./var/tmp:/app/var/tmp
      - ./var/data:/app/var/data

  web:
    depends_on:
      signals-legacy:
        condition: service_started
    environment:
      SIGNALS_API_URL: ${SIGNALS_API_URL:-http://signals-legacy:8081}

  bot:
    depends_on:
      signals-legacy:
        condition: service_started
    environment:
      SIGNALS_API_URL: ${BOT_SIGNALS_API_URL:-http://signals-legacy:8081}
      SIGNALS_FEED_URL: ${BOT_SIGNALS_FEED_URL:-http://signals-legacy:8081}

  bots-hive:
    depends_on:
      signals-legacy:
        condition: service_started
    environment:
      SIGNALS_API_URL: ${BOT_SIGNALS_API_URL:-http://signals-legacy:8081}
      SIGNALS_FEED_URL: ${BOT_SIGNALS_FEED_URL:-http://signals-legacy:8081}
