version: 1
exchange: bitmex
default_profile: main
profiles:
    main:
        api_base: https://www.bitmex.com/
        ws_public:
            - wss://www.bitmex.com/realtime
        ws_private:
            - wss://www.bitmex.com/realtime
        ws_endpoint_strategy: primary_only
        ws_disabled: false
    testnet:
        api_base: https://testnet.bitmex.com/
        ws_public:
            - wss://testnet.bitmex.com/realtime
        ws_private:
            - wss://testnet.bitmex.com/realtime
        ws_endpoint_strategy: primary_only
        ws_disabled: false
