[xdebug]
; Extension is loaded by docker-php-ext-xdebug.ini, do not load it twice here.

; Keep developer helpers enabled, but avoid noisy trigger diagnostics in app error logs.
xdebug.mode=develop,debug

; Keep Xdebug internal diagnostics separate from PHP application error logs.
xdebug.log=${XDEBUG_LOG_FILE:-/tmp/xdebug.log}
xdebug.log_level=${XDEBUG_LOG_LEVEL:-0}

; Collect variable information
xdebug.collect_params=4
xdebug.collect_return=1
xdebug.collect_assignments=1

; Stack trace configuration
xdebug.max_data=65535
xdebug.trace_format=1

; Error collection for better error pages
xdebug.show_error_trace=1
