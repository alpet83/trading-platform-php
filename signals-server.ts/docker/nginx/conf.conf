map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    root   /usr/share/nginx/html;

    client_max_body_size 1000M;

    location = / {
            return 301 ${APP_BASE_PATH}/;
    }

    location = /admin {
            return 301 ${APP_BASE_PATH}/admin/;
    }

    location ^~ /admin/ {
            return 301 ${APP_BASE_PATH}$request_uri;
    }

    location = ${APP_BASE_PATH} {
            return 301 ${APP_BASE_PATH}/;
    }

    location ^~ ${APP_BASE_PATH}/admin/ {
            alias /usr/share/nginx/html/admin/;
            index index.html index.htm;
            try_files $uri $uri/ /usr/share/nginx/html/admin/index.html;
    }

    # Static frontend under base path
    location ^~ ${APP_BASE_PATH}/ {
            alias /usr/share/nginx/html/;
            index index.html index.htm;
            try_files $uri $uri/ /usr/share/nginx/html/index.html;
    }

    # Fallback: redirect non-prefixed requests to the base path.
    # Must not catch already-prefixed URLs (handled by the block above).
    location / {
            return 301 ${APP_BASE_PATH}$request_uri;
    }

    location = /api {
        return 301 ${APP_BASE_PATH}/api;
    }

    location ^~ /api/ {
        return 301 ${APP_BASE_PATH}$request_uri;
    }

    # Backend is mounted externally at ${APP_BASE_PATH}/api/*,
    # but inside Nest routes are /api/*.
    # So we must strip `${APP_BASE_PATH}` and keep `/api/...`.

    location = ${APP_BASE_PATH}/api {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://backend-node:3001/api;
    }

    location ^~ ${APP_BASE_PATH}/api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://backend-node:3001/api/;
    }
}
