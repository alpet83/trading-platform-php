# ============================================================================
# docker-compose.override.yml — Test/Development Overrides for HA Pair
# 
# USE: docker-compose -f docker-compose.yml -f docker-compose.override.yml up -d
# 
# For production, do NOT use this file. Instead:
#   - Set env vars in .env file
#   - Use separate docker-compose.ha-primary.yml / docker-compose.ha-standby.yml
# ============================================================================

services:
  mariadb:
    environment:
      # === TEST REPLACEMENTS (overrides .env values) ===
      
      # Root & app user credentials (test-only)
      MARIADB_ROOT_PASSWORD: test_root_123
      MARIADB_PASSWORD: test_trading_456
      
      # Replication user & recovery credentials (test-only)
      MARIADB_REPL_USER: test_repl
      MARIADB_REPL_PASSWORD: test_repl_789
      MARIADB_REMOTE_USER: test_remote_master
      MARIADB_REMOTE_PASSWORD: test_remote_pass_999
      
      # Backup & logging (test-friendly)
      MARIADB_BACKUP_ON_START: 1
      MARIADB_BACKUP_RETENTION_DAYS: 1
      MARIADB_BACKUP_DIR: /var/backup/mysql
      
      # Watchdog (faster ticks for testing)
      WATCHDOG_INTERVAL_SECONDS: 5
      MARIADB_MAX_REPL_LAG_SECONDS: 30
      
      # Replication
      MARIADB_BINLOG_EXPIRE_SECONDS: 3600
      MARIADB_RELAY_LOG_SPACE_LIMIT: 536870912

      # For standby container (set PRIMARY_HOST to primary container DNS or IP)
      PRIMARY_HOST: mariadb
      PRIMARY_PORT: 3306

  web:
    environment:
      # Optional: use test DB credentials
      DB_PASS: test_trading_456
      DB_USER: trading

  bots-hive:
    # Exchange-specific runtime env overlays.
    # Keep production defaults in docker-compose.yml unchanged; use these local files instead.
    env_file:
      - path: ./.envs/exchanges/common.env
        required: false
      - path: ./.envs/exchanges/bybit.env
        required: false
      - path: ./.envs/exchanges/bitmex.env
        required: false
    # Debug network so nginx-router (on mcp_debug_net) can reach mcp_server.py on port 8084.
    # mcp_server.py is injected via scripts/mcp_inject.sh; no host port binding needed.
    networks:
      - exchange-egress
      - trd_default
      - mcp_debug_net      
networks:
  trd_default:
    external: true
    name: trd_default
  mcp_debug_net:
    external: true
    name: mcp_debug_net
  exchange-egress:
    external: true