components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: |
        Токен авторизации для доступа к API.
        
        Пример использования:
        ```
        Authorization: Bearer Vs9yo5HfkXewfzqYkjM$d/@6W3ZrNWCTiQSVLC0f6X4
        ```
        
        Дополнительно передается заголовок X-User-Id с Telegram ID пользователя
        для определения прав доступа.

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          description: Telegram ID пользователя
          example: 123456789
        user_name:
          type: string
          description: Имя пользователя в Telegram
          example: "john_doe"
        rights:
          type: array
          description: Массив прав доступа
          items:
            type: string
            enum: [ view, trade, admin ]
          example: ["trade", "view"]
        enabled:
          type: integer
          description: Статус активности (1 - активен, 0 - отключен)
          enum: [ 0, 1 ]
          example: 1
    Signal:
      type: object
      properties:
        id:
          type: integer
          description: Уникальный идентификатор сигнала
          example: 123
        timestamp:
          type: integer
          description: Временная метка в формате Unix timestamp
          example: 1725357000
        signal_no:
          type: integer
          description: Номер сигнала
          example: 1
        side:
          type: string
          description: Сторона сделки
          enum: [ BUY, SELL, SHORT ]
          example: "BUY"
        pair:
          type: string
          description: Название торговой пары
          example: "BTCUSD"
        pair_id:
          type: integer
          description: Идентификатор торговой пары
          example: 1
        multiplier:
          type: number
          description: Мультипликатор сигнала
          example: 1.5
        accumulated_position:
          type: number
          description: Накопленная позиция
          example: 2.5
        limit_price:
          type: number
          description: Лимитная цена
          example: 45000.0
        take_profit:
          type: number
          description: Цена фиксации прибыли
          example: 50000.0
        stop_loss:
          type: number
          description: Стоп-лосс цена
          example: 40000.0
        stop_loss_diff_percent:
          type: number
          description: Разница между текущей ценой и стоп-лоссом в процентах
          example: -8.5
        ttl:
          type: integer
          description: Time to live для сигнала
          example: 10
        flags:
          type: object
          description: Флаги активации различных параметров
          properties:
            limit_price:
              type: boolean
              description: Активна ли лимитная цена
              example: false
            take_profit:
              type: boolean
              description: Активен ли тейк-профит
              example: true
            stop_loss:
              type: boolean
              description: Активен ли стоп-лосс
              example: true
            stop_endless:
              type: boolean
              description: Активен ли бесконечный стоп
              example: false
        comment:
          type: string
          nullable: true
          description: Комментарий к сигналу
          example: "Test signal"
        currency_symbol:
          type: string
          description: Символ валюты
          example: "$"
        last_price:
          type: number
          description: Последняя цена
          example: 43500.0
        coefficient:
          type: number
          description: Коэффициент для расчета количества
          example: 1.0
        amount:
          type: number
          description: Рассчитанное количество
          example: 2
        colors:
          type: object
          description: Цвета для отображения
          properties:
            background:
              type: string
              description: Цвет фона
              example: "#ff0000"
            font:
              type: string
              description: Цвет шрифта
              example: "#ffffff"
    Error:
      type: object
      properties:
        error:
          type: string
          description: Описание ошибки
          example: "Database configuration not found"